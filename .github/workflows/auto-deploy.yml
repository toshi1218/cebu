name: Auto Deploy

on:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Commit updated build artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add igrs-netlify/
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild igrs-netlify [skip ci]"
            git push origin master
          fi

      - name: Merge master into production
        run: |
          git fetch origin master
          git checkout -f production
          git reset --hard origin/production
          git merge origin/master --no-edit
          git push origin production

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Cloudflare Pages deploy
        run: sleep 90

      - name: Run SEO smoke tests
        run: |
          chmod +x scripts/seo-smoke.sh
          scripts/seo-smoke.sh
