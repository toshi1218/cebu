name: Quality Gate

on:
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build Astro site
        run: npm run build
      - name: Verify build output
        run: |
          echo "=== Checking build output ==="
          # Check that key pages were generated
          for page in \
            dist/ja/index.html \
            dist/en/index.html \
            dist/ja/services/index.html \
            dist/en/services/index.html \
            dist/ja/about/index.html \
            dist/en/about/index.html \
            dist/ja/contact/index.html \
            dist/en/contact/index.html \
            dist/index.html \
            dist/robots.txt \
            dist/sitemap.xml; do
            if [ ! -f "$page" ]; then
              echo "FAIL: $page not found"
              exit 1
            fi
            echo "OK: $page"
          done
          echo "=== All pages verified ==="
