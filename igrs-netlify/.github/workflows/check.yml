name: Quality Checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run charset check
        run: npm run check:charset

      - name: Run mojibake check
        run: npm run check:mojibake

      - name: Run link check
        run: npm run check:links

      - name: Run SEO check
        run: npm run check:seo

      - name: Run JSON-LD check
        run: npm run check:jsonld

      - name: Check Prettier formatting
        run: npm run format:check
